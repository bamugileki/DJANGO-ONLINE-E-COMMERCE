<div class="mb-3">
    <label class="form-label fw-semibold">{{ label }}</label>
    <div class="d-flex gap-2 flex-wrap">
        <div class="form-check">
            <input class="form-check-input" type="radio" name="{{ name }}" id="{{ name }}_1" value="1" required>
            <label class="form-check-label small" for="{{ name }}_1">Strongly Disagree</label>
        </div>
        <div class="form-check">
            <input class="form-check-input" type="radio" name="{{ name }}" id="{{ name }}_2" value="2" required>
            <label class="form-check-label small" for="{{ name }}_2">Disagree</label>
        </div>
        <div class="form-check">
            <input class="form-check-input" type="radio" name="{{ name }}" id="{{ name }}_3" value="3" required>
            <label class="form-check-label small" for="{{ name }}_3">Neutral</label>
        </div>
        <div class="form-check">
            <input class="form-check-input" type="radio" name="{{ name }}" id="{{ name }}_4" value="4" required>
            <label class="form-check-label small" for="{{ name }}_4">Agree</label>
        </div>
        <div class="form-check">
            <input class="form-check-input" type="radio" name="{{ name }}" id="{{ name }}_5" value="5" required>
            <label class="form-check-label small" for="{{ name }}_5">Strongly Agree</label>
        </div>
    </div>
</div>
