{% extends 'base.html' %}

{% block title %}{% if product %}Edit{% else %}Add{% endif %} Product{% endblock %}

{% block content %}
<h1 class="page-title"><i class="bi bi-box"></i> {% if product %}Edit{% else %}Add{% endif %} Product</h1>

<div class="card p-4">
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Product Name</label>
            <input type="text" name="name" class="form-control" value="{{ product.name|default:'' }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Category</label>
            <select name="category" class="form-select" required>
                {% for cat in categories %}
                <option value="{{ cat.id }}" {% if product and product.category.id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="row mb-3">
            <div class="col-md-6">
                <label class="form-label">Price ({{ site_settings.currency }})</label>
                <input type="number" name="price" step="0.01" class="form-control" value="{{ product.price|default:'' }}" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Stock</label>
                <input type="number" name="stock" class="form-control" value="{{ product.stock|default:0 }}" required>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea name="description" class="form-control" rows="4" required>{{ product.description|default:'' }}</textarea>
        </div>
        <div class="mb-3">
            <label class="form-label">Image</label>
            <input type="file" name="image" class="form-control" accept="image/*">
            {% if product and product.image %}
            <img src="{{ product.image.url }}" class="mt-2" style="max-height:100px;">
            {% endif %}
        </div>
        {% if product %}
        <div class="mb-3 form-check">
            <input type="checkbox" name="available" class="form-check-input" id="available" {% if product.available %}checked{% endif %}>
            <label class="form-check-label" for="available">Available</label>
        </div>
        {% endif %}
        <button type="submit" class="btn btn-gradient btn-sparkle">
            <i class="bi bi-check-circle"></i> {% if product %}Update{% else %}Add{% endif %} Product
        </button>
        <a href="{% url 'vendor_products' %}" class="btn btn-outline-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
