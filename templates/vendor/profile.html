{% extends 'base.html' %}

{% block title %}Vendor Profile{% endblock %}

{% block content %}
<h1 class="page-title"><i class="bi bi-person-circle"></i> Vendor Profile</h1>

<div class="card p-4">
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="text-center mb-4">
            {% if vendor.logo %}
            <img src="{{ vendor.logo.url }}" class="rounded-circle" style="width:100px;height:100px;object-fit:cover;">
            {% else %}
            <div class="profile-avatar" style="width:100px;height:100px;font-size:2.5rem;margin:0 auto;">{{ vendor.business_name|first|upper }}</div>
            {% endif %}
        </div>
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label">Business Name</label>
                <input type="text" name="business_name" class="form-control" value="{{ vendor.business_name }}" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Business Email</label>
                <input type="email" name="business_email" class="form-control" value="{{ vendor.business_email }}" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Phone</label>
                <input type="text" name="phone" class="form-control" value="{{ vendor.phone }}" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">City</label>
                <input type="text" name="city" class="form-control" value="{{ vendor.city }}">
            </div>
            <div class="col-12">
                <label class="form-label">Address</label>
                <input type="text" name="address" class="form-control" value="{{ vendor.address }}">
            </div>
            <div class="col-12">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-control" rows="3">{{ vendor.description }}</textarea>
            </div>
            <div class="col-12">
                <label class="form-label">Logo</label>
                <input type="file" name="logo" class="form-control" accept="image/*">
            </div>
        </div>
        <button type="submit" class="btn btn-gradient mt-4"><i class="bi bi-check-circle"></i> Update Profile</button>
    </form>
</div>
{% endblock %}
