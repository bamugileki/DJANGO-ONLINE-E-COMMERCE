{% extends 'base.html' %}
{% block title %}Set Password — {{ target.username }}{% endblock %}
{% block content %}
<style>
  .page-header {
    background: linear-gradient(135deg, #1a1a2e 0%, #2d3436 100%);
    border-radius: 20px; padding: 25px 30px; color: white;
    margin-bottom: 25px;
  }
  .page-header h1 { font-weight: 800; font-size: 1.6rem; margin: 0; }
  .page-header p { margin: 3px 0 0; opacity: 0.7; font-size: 0.9rem; }
  .card-form {
    border: none; border-radius: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.06); padding: 30px;
  }
  .card-form input {
    border-radius: 8px; border: 2px solid #e8e8e8;
    padding: 0.75rem 1rem; width: 100%; transition: all 0.3s ease;
  }
  .card-form input:focus {
    border-color: #6c5ce7;
    box-shadow: 0 0 0 3px rgba(108,92,231,0.15);
    outline: none;
  }
</style>
<div class="page-header fade-in-up">
  <div>
    <h1><i class="bi bi-key"></i> Set Password</h1>
    <p>Changing password for <strong>{{ target.username }}</strong> ({{ target.email }})</p>
  </div>
</div>
<div class="row justify-content-center fade-in-up">
  <div class="col-md-6">
    <div class="card-form">
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-semibold">New Password</label>
          <input type="password" name="password" class="form-control" minlength="8" required placeholder="At least 8 characters">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Confirm Password</label>
          <input type="password" name="confirm_password" class="form-control" minlength="8" required placeholder="Repeat password">
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-gradient flex-fill btn-sparkle">
            <i class="bi bi-check-circle"></i> Update Password
          </button>
          <a href="{% url 'manage_users' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
