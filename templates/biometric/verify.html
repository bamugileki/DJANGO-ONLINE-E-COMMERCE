{% extends 'base.html' %}
{% load static %}

{% block title %}Face Verification{% endblock %}

{% block content %}
<div class="row justify-content-center fade-in-up">
    <div class="col-md-8 col-lg-6">
        <div class="card-form text-center">
            <div class="profile-avatar" style="width:70px;height:70px;font-size:2rem;margin:0 auto 1rem;">
                <i class="bi bi-shield-check"></i>
            </div>
            <h4 class="fw-bold">Face Verification</h4>
            <p class="text-muted mb-4">Verify your identity using facial recognition with liveness detection.</p>

            <div class="position-relative rounded-4 overflow-hidden border border-2 border-primary mb-4 mx-auto" style="max-width:480px;aspect-ratio:4/3;background:#1a1a2e;">
                <div id="placeholderDiv" class="d-flex align-items-center justify-content-center h-100 text-white-50">
                    <div>
                        <i class="bi bi-camera" style="font-size:3rem;display:block;margin-bottom:0.5rem;"></i>
                        <span>Camera preview appears here</span>
                    </div>
                </div>
                <video id="video" autoplay playsinline class="w-100 h-100 object-fit-cover d-none"></video>
                <canvas id="canvas" class="d-none"></canvas>
                <div id="scanOverlay" class="position-absolute top-0 start-0 w-100 h-100 d-none" style="background:rgba(59,130,246,0.1);pointer-events:none;">
                    <div class="scan-line"></div>
                </div>
            </div>

            <button type="button" id="verifyBtn" class="btn btn-gradient btn-lg w-100 btn-sparkle mb-3">
                <i class="bi bi-camera"></i> <span id="verifyBtnText">Start Camera</span>
            </button>

            <div class="p-3 bg-light rounded-3 mb-3">
                <div class="d-flex align-items-center gap-2 justify-content-center">
                    <div id="statusIndicator" class="rounded-circle" style="width:12px;height:12px;background:#adb5bd;"></div>
                    <span id="resultText" class="text-muted small fw-semibold">System Ready</span>
                </div>
            </div>

            <a href="{{ next_url }}" class="text-decoration-none fw-bold" style="color:var(--primary);">
                <i class="bi bi-arrow-left"></i> Skip & Go Back
            </a>
        </div>
    </div>
</div>

<style>
    .scan-line {
        position: absolute;
        width: 100%;
        height: 2px;
        background: #3b82f6;
        box-shadow: 0 0 15px rgba(59,130,246,0.8);
        animation: scan 2s ease-in-out infinite;
        top: 10%;
    }
    @keyframes scan {
        0% { top: 10%; opacity: 0; }
        50% { opacity: 1; }
        100% { top: 90%; opacity: 0; }
    }
</style>

<script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const verifyBtn = document.getElementById("verifyBtn");
    const verifyBtnText = document.getElementById("verifyBtnText");
    const resultText = document.getElementById("resultText");
    const statusIndicator = document.getElementById("statusIndicator");
    const scanOverlay = document.getElementById("scanOverlay");
    const placeholderDiv = document.getElementById("placeholderDiv");

    let globalStream = null;
    const csrfToken = "{{ csrf_token }}";

    function startCamera() {
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(stream => {
                globalStream = stream;
                video.srcObject = stream;
                video.classList.remove('d-none');
                placeholderDiv.classList.add('d-none');
                resultText.textContent = "Camera Online - Click to Verify";
                resultText.className = "fw-semibold small";
                resultText.style.color = "#333";
                statusIndicator.style.background = "#3b82f6";
                statusIndicator.style.boxShadow = "0 0 10px rgba(59,130,246,1)";
            })
            .catch(err => {
                console.error("Camera Error:", err);
                resultText.textContent = "Camera access denied";
                resultText.className = "fw-semibold small text-danger";
                statusIndicator.style.background = "#dc3545";
            });
    }

    function stopCamera() {
        if (globalStream) {
            globalStream.getTracks().forEach(track => track.stop());
            video.srcObject = null;
            video.classList.add('d-none');
            placeholderDiv.classList.remove('d-none');
            globalStream = null;
        }
    }

    verifyBtn.addEventListener("click", () => {
        if (!globalStream) {
            startCamera();
            verifyBtnText.textContent = "Verify";
            verifyBtn.innerHTML = '<i class="bi bi-shield-check"></i> <span id="verifyBtnText">Verify</span>';
            return;
        }
        if (!video.videoWidth) {
            alert("Camera still starting up. Please wait.");
            return;
        }

        const context = canvas.getContext("2d");
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        const dataURL = canvas.toDataURL("image/jpeg", 0.9);

        scanOverlay.classList.remove('d-none');
        resultText.textContent = "Verifying...";
        resultText.className = "fw-semibold small";
        resultText.style.color = "#3b82f6";
        statusIndicator.style.background = "#3b82f6";
        verifyBtn.disabled = true;
        verifyBtn.classList.add('disabled');

        fetch("{% url 'biometric_verify_descriptor' %}", {
            method: "POST",
            headers: { "Content-Type": "application/json", "X-CSRFToken": csrfToken },
            body: JSON.stringify({ image: dataURL })
        })
        .then(response => response.json())
        .then(data => {
            if (data.status === "ok") {
                statusIndicator.style.background = "#198754";
                resultText.textContent = "Verification Successful!";
                resultText.className = "fw-semibold small text-success";
                setTimeout(() => { window.location.href = "{{ next_url }}"; }, 1000);
            } else {
                statusIndicator.style.background = "#dc3545";
                resultText.textContent = data.message || "Verification Failed";
                resultText.className = "fw-semibold small text-danger";
            }
        })
        .catch(error => {
            console.error("Error:", error);
            resultText.textContent = "Network Error";
            resultText.className = "fw-semibold small text-danger";
            statusIndicator.style.background = "#dc3545";
        })
        .finally(() => {
            scanOverlay.classList.add('d-none');
            verifyBtn.disabled = false;
            verifyBtn.classList.remove('disabled');
            stopCamera();
        });
    });
</script>
{% endblock %}
