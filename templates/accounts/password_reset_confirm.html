{% extends 'base.html' %}

{% block title %}Set New Password{% endblock %}

{% block content %}
    <div class="row justify-content-center fade-in-up">
        <div class="col-md-6 col-lg-5">
            <div class="card-form">
                <div class="text-center mb-4">
                    <div class="profile-avatar" style="width:70px;height:70px;font-size:2rem;">
                        <i class="bi bi-shield-lock"></i>
                    </div>
                    <h4 class="fw-bold mt-3">Set New Password</h4>
                </div>
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                        <div class="mb-3">
                            <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}
                                <div class="text-danger small mt-1">{{ field.errors }}</div>
                            {% endif %}
                        </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-gradient w-100 btn-lg btn-sparkle">
                        <i class="bi bi-check-circle"></i> Set Password
                    </button>
                </form>
            </div>
        </div>
    </div>

    <style>
        .card-form input {
            border-radius: var(--radius-sm);
            border: 2px solid #e8e8e8;
            padding: 0.75rem 1rem;
            transition: all 0.3s ease;
            width: 100%;
        }
        .card-form input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(108,92,231,0.15);
            outline: none;
        }
    </style>
{% endblock %}
